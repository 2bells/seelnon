<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miliastra Prime</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .hero {
            text-align: center;
            border: 2px solid #fff;
            padding: 40px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 48px;
            margin: 0;
            letter-spacing: 5px;
        }
        p {
            font-size: 20px;
            opacity: 0.7;
        }
        .orb {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff 0%, #000 70%);
            border-radius: 50%;
            margin: 20px auto;
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 1; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div class="hero">
        <h1>MILIASTRA PRIME</h1>
        <div class="orb"></div>
        <p>A new wonderland is being forged...</p>
    </div>
</body>
</html>
