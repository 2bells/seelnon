<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BRUT_SKETCH</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><rect x='20' y='20' width='60' height='60' fill='white'/></svg>">
    <link rel="stylesheet" href="./src/index.css">
  </head>
  <body class="bg-[#f0f0f0] text-black overflow-hidden font-mono selection:bg-black selection:text-white">
    <div id="app" class="fixed inset-0 flex flex-col">
      <!-- BRUTALIST TOOLBAR -->
      <div id="top-bar" class="h-12 bg-white border-b-2 border-black flex items-center px-2 gap-2 z-50 pointer-events-auto">
        <div class="flex border-r-2 border-black pr-2">
          <button id="btn-save" title="Save" class="p-2 hover:bg-black hover:text-white border border-transparent active:bg-black">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          </button>
          <button id="btn-undo" title="Undo" class="p-2 hover:bg-black hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
          </button>
          <button id="btn-redo" title="Redo" class="p-2 hover:bg-black hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
          </button>
        </div>
        
        <div class="flex gap-1" id="tool-group">
          <button id="btn-brush" class="tool-btn p-2 bg-black text-white border-2 border-black" title="Brush (1)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
          </button>
          <button id="btn-eraser" class="tool-btn p-2 hover:bg-black hover:text-white border-2 border-transparent" title="Eraser (2)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.9-9.9c1-1 2.5-1 3.4 0l4.4 4.4c1 1 1 2.5 0 3.4l-4.4 4.4"/><path d="M22 21H7"/></svg>
          </button>
      <button id="btn-wireframe" class="tool-btn p-2 hover:bg-black hover:text-white border-2 border-transparent" title="Wireframe (3)">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M5 22a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M5 6v10"/><path d="M19 14a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M5 16s4.5-4.5 14-4.5"/></svg>
      </button>
          <button id="btn-lasso" class="tool-btn p-2 hover:bg-black hover:text-white border-2 border-transparent" title="Lasso (4)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M7 22a5 5 0 0 1-2-4"/><path d="M3.3 14A6.8 6.8 0 0 1 2 10c0-4.4 4.5-8 10-8s10 3.6 10 8-4.5 8-10 8a12 12 0 0 1-5-1"/></svg>
          </button>
        </div>

        <div class="h-6 w-px bg-black mx-2"></div>

        <div class="flex items-center gap-3">
          <div class="flex flex-col">
            <label class="text-[10px] font-black uppercase leading-none mb-1">Size</label>
            <input type="range" id="brush-size" min="1" max="500" value="40" class="w-24 h-6 brutal-range">
          </div>
          <span id="size-val" class="text-xs font-black min-w-[24px]">40</span>
        </div>

        <div class="flex items-center gap-3 ml-2">
          <div class="flex flex-col">
            <label class="text-[10px] font-black uppercase leading-none mb-1">Opacity</label>
            <input type="range" id="brush-opacity" min="0" max="100" value="100" class="w-20 h-6 brutal-range">
          </div>
          <span id="opacity-val" class="text-xs font-black min-w-[32px]">100%</span>
        </div>

        <div class="flex items-center gap-3 ml-2">
          <div class="flex flex-col">
            <label class="text-[10px] font-black uppercase leading-none mb-1">Flow</label>
            <input type="range" id="brush-flow" min="0" max="100" value="100" class="w-20 h-6 brutal-range">
          </div>
          <span id="flow-val" class="text-xs font-black min-w-[32px]">100%</span>
        </div>

        <!-- Speed Sensitivity Section -->
        <div class="h-6 w-px bg-black mx-2"></div>
        
        <div class="flex items-center gap-4">
          <div class="flex flex-col">
            <label class="text-[8px] font-black uppercase leading-none mb-1" title="Speed Size Sensitivity">S-Size</label>
            <input type="range" id="speed-size" min="-1000" max="1000" value="800" class="w-20 h-5 brutal-range s-range">
          </div>
          <div class="flex flex-col">
            <label class="text-[8px] font-black uppercase leading-none mb-1" title="Speed Opacity Sensitivity">S-Opac</label>
            <input type="range" id="speed-opacity" min="-1000" max="1000" value="600" class="w-20 h-5 brutal-range s-range">
          </div>
          <div class="flex flex-col">
            <label class="text-[8px] font-black uppercase leading-none mb-1" title="Speed Value Sensitivity">S-Val</label>
            <input type="range" id="speed-value" min="-1000" max="1000" value="-400" class="w-20 h-5 brutal-range s-range">
          </div>
          <div class="flex flex-col">
            <label class="text-[8px] font-black uppercase leading-none mb-1" title="Speed Hue Sensitivity">S-Hue</label>
            <input type="range" id="speed-hue" min="-1000" max="1000" value="-1000" class="w-20 h-5 brutal-range s-range">
          </div>
        </div>

        <div class="flex-grow"></div>

        <div class="flex gap-2 mr-2">
          <button id="btn-clear" class="text-[10px] font-black px-3 py-1 border-2 border-black hover:bg-black hover:text-white uppercase transition-colors">Clear</button>
          <button id="btn-fullscreen" class="text-[10px] font-black px-3 py-1 border-2 border-black hover:bg-black hover:text-white uppercase transition-colors">Full</button>
        </div>
      </div>

      <!-- WORKSPACE -->
      <div class="flex-grow relative overflow-hidden bg-white" id="canvas-container">
        
        <!-- FLOATING PANELS (RAW BRUTALIST) -->
        <div id="panel-color" class="ui-shield absolute top-6 left-6 w-56 bg-white border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-40 pointer-events-auto">
          <div id="handle-color" class="p-2 border-b-2 border-black bg-white flex justify-between items-center cursor-move active:bg-black active:text-white">
            <span class="text-[10px] font-black uppercase tracking-tighter">Color Palette</span>
            <div class="w-4 h-4 bg-black border border-black" id="current-color-preview"></div>
          </div>
          <div class="p-2">
             <div id="palette" class="grid grid-cols-6 gap-1 mb-2"></div>
             <button id="btn-reset-palette" class="w-full text-[9px] font-black py-1 border-2 border-black hover:bg-black hover:text-white uppercase">Reset</button>
          </div>
        </div>

        <div id="panel-images" class="ui-shield absolute top-6 right-6 w-52 bg-white border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-40 pointer-events-auto">
           <div id="handle-images" class="p-2 border-b-2 border-black bg-white flex justify-between items-center cursor-move active:bg-black active:text-white">
            <span class="text-[10px] font-black uppercase tracking-tighter">Reference</span>
            <button id="btn-close-images" class="font-black">X</button>
          </div>
          <div class="p-2 flex flex-col gap-2">
            <div id="image-list" class="flex flex-col gap-1 max-h-32 overflow-y-auto">
              <div class="text-[9px] text-center py-2 uppercase opacity-40">Empty</div>
            </div>
            <button id="btn-import" class="w-full py-2 border-2 border-dashed border-black flex items-center justify-center hover:bg-neutral-100">
               <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
            <input type="file" id="file-import" class="hidden" accept="image/*">
          </div>
        </div>

        <div id="panel-layers" class="ui-shield absolute bottom-6 left-6 w-44 bg-white border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-40 pointer-events-auto">
           <div class="p-2 border-b-2 border-black bg-white">
            <span class="text-[10px] font-black uppercase tracking-tighter">Layers</span>
          </div>
          <div id="layer-stack" class="p-1 flex flex-col gap-1"></div>
        </div>

        <!-- STATUS -->
        <div id="panel-status" class="ui-shield absolute bottom-6 right-6 flex items-center gap-4 text-[10px] font-black bg-white border-2 border-black px-3 py-1.5 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] pointer-events-auto">
           <div class="flex gap-2 items-center">
              <button id="btn-zoom-out" class="w-5 h-5 border border-black flex items-center justify-center hover:bg-black hover:text-white">-</button>
              <span id="zoom-val" class="w-10 text-center select-none tracking-tighter">100%</span>
              <button id="btn-zoom-in" class="w-5 h-5 border border-black flex items-center justify-center hover:bg-black hover:text-white">+</button>
           </div>
           <button id="btn-zoom-fit" class="hover:underline">FIT</button>
           <div class="w-[2px] h-3 bg-black"></div>
           <div id="status" class="uppercase">READY</div>
        </div>
      </div>
    </div>

    <!-- PICKER -->
    <div id="color-picker-indicator" class="fixed pointer-events-none w-10 h-10 border-4 border-black mix-blend-difference hidden translate-x-[-50%] translate-y-[-50%]"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
