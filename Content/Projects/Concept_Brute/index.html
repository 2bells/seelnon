<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CONCEPT_BRUTE</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><rect x='20' y='20' width='60' height='60' fill='white'/></svg>">
    <link rel="stylesheet" href="./src/index.css">
  </head>
  <body>
    <div id="app">
      <!-- BRUTALIST TOOLBAR -->
      <div id="top-bar">
        <div class="history-group">
          <button id="btn-save" title="Save" class="tool-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          </button>
          <button id="btn-undo" title="Undo" class="tool-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
          </button>
          <button id="btn-redo" title="Redo" class="tool-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
          </button>
        </div>
        
        <div class="toolbar-divider"></div>

        <div class="tool-group" id="tool-group">
          <button id="btn-brush" class="tool-btn active-tool" title="Brush (1)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
          </button>
          <button id="btn-eraser" class="tool-btn" title="Eraser (2)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.9-9.9c1-1 2.5-1 3.4 0l4.4 4.4c1 1 1 2.5 0 3.4l-4.4 4.4"/><path d="M22 21H7"/></svg>
          </button>
          <button id="btn-wireframe" class="tool-btn" title="Wireframe (3)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M5 22a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M5 6v10"/><path d="M19 14a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M5 16s4.5-4.5 14-4.5"/></svg>
          </button>
          <button id="btn-lasso" class="tool-btn" title="Lasso (4)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 22a5 5 0 0 1-2-4"/><path d="M3.3 14A6.8 6.8 0 0 1 2 10c0-4.4 4.5-8 10-8s10 3.6 10 8-4.5 8-10 8a12 12 0 0 1-5-1"/></svg>
          </button>
        </div>


        <div class="slider-group">
            <div class="slider-container">
                <label class="slider-label">Size</label>
                <div class="slider-controls">
                    <input type="range" id="brush-size" min="1" max="500" value="40" class="brutal-range">
                    <span id="size-val" class="slider-value">40</span>
                </div>
            </div>

            <div class="slider-container">
                <label class="slider-label">Opacity</label>
                <div class="slider-controls">
                    <input type="range" id="brush-opacity" min="0" max="100" value="100" class="brutal-range">
                    <span id="opacity-val" class="slider-value">100%</span>
                </div>
            </div>

            <div class="slider-container">
                <label class="slider-label">Flow</label>
                <div class="slider-controls">
                    <input type="range" id="brush-flow" min="0" max="100" value="100" class="brutal-range">
                    <span id="flow-val" class="slider-value">100%</span>
                </div>
            </div>
        </div>

        
        
        <div class="sensitivity-group">
          <div class="slider-container">
            <label class="slider-label" title="Speed Size Sensitivity">S-Size</label>
            <input type="range" id="speed-size" min="-1000" max="1000" value="800" class="brutal-range s-range">
          </div>
          <div class="slider-container">
            <label class="slider-label" title="Speed Opacity Sensitivity">S-Opac</label>
            <input type="range" id="speed-opacity" min="-1000" max="1000" value="600" class="brutal-range s-range">
          </div>
          <div class="slider-container">
            <label class="slider-label" title="Speed Value Sensitivity">S-Val</label>
            <input type="range" id="speed-value" min="-1000" max="1000" value="-400" class="brutal-range s-range">
          </div>
          <div class="slider-container">
            <label class="slider-label" title="Speed Hue Sensitivity">S-Hue</label>
            <input type="range" id="speed-hue" min="-1000" max="1000" value="-1000" class="brutal-range s-range">
          </div>
        </div>

        

        <div class="flex-grow"></div>

        <div class="history-group" style="margin-right: 8px;">
          <button id="btn-settings" title="Settings" class="tool-btn with-shadow">
             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button id="btn-clear" class="brutal-btn">Clear</button>
          <button id="btn-fullscreen" class="brutal-btn">Full</button>
        </div>
      </div>

      <!-- WORKSPACE -->
      <div id="canvas-container">
        <div id="brush-cursor"></div>
        
        <!-- FLOATING PANELS -->
        <div id="panel-color" class="ui-panel">
          <div id="handle-color" class="panel-handle">
            <span class="panel-title">Color Palette</span>
            <div id="current-color-preview"></div>
          </div>
          <div class="panel-content">
             <!-- CUSTOM COLOR SELECTOR -->
             <div id="color-selector">
                <div id="sv-picker">
                   <div class="sv-cursor"></div>
                </div>
                <input type="range" id="hue-slider" min="0" max="360" value="0">
             </div>
             <!-- SWATCHES -->
             <div id="palette"></div>
             <button id="btn-reset-palette" class="brutal-btn full-width">Reset</button>
          </div>
        </div>

        <div id="panel-images" class="ui-panel">
           <div id="handle-images" class="panel-handle">
            <span class="panel-title">Reference</span>
          </div>
          <div class="panel-content">
            <div id="image-list">
              <div class="empty-state">Empty</div>
            </div>
            <button id="btn-import" class="import-area">
               <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
            <input type="file" id="file-import" class="hidden" accept="image/*">
          </div>
        </div>

        <div id="panel-layers" class="ui-panel">
           <div id="handle-layers" class="panel-handle">
            <span class="panel-title">Layers</span>
            <div id="status" class="status-indicator">READY</div>
          </div>
          <div id="layer-stack"></div>
          
          <!-- ZOOM UI AT BOTTOM OF LAYERS PANEL -->
          <div class="zoom-container">
            <div class="zoom-buttons">
                <button id="btn-zoom-out" class="mini-btn">-</button>
                <span id="zoom-val" class="zoom-value">100%</span>
                <button id="btn-zoom-in" class="mini-btn">+</button>
                <div style="width: 8px;"></div>
                <button id="btn-zoom-fit" class="mini-btn" style="height: 16px; padding: 0 4px;">FIT</button>
            </div>
          </div>
        </div>

        <!-- SETTINGS PANEL -->
        <div id="panel-settings" class="ui-panel hidden">
          <div id="handle-settings" class="panel-handle">
            <span class="panel-title">Settings</span>
            <button id="btn-close-settings" class="mini-btn">X</button>
          </div>
          <div class="panel-content settings-main">
             <div class="settings-group">
                <label class="settings-label">Canvas Background</label>
                <input type="color" id="settings-bg-color" value="#ffffff" class="settings-input-color">
             </div>
             <div class="settings-group">
                <label class="settings-label">Grid Color</label>
                <input type="color" id="settings-grid-color" value="#cccccc" class="settings-input-color">
             </div>
             <div class="settings-row">
                <label class="settings-label">Show Grid</label>
                <input type="checkbox" id="settings-grid-show" checked class="settings-input-check">
             </div>
             <div class="settings-divider"></div>
             <div class="settings-group">
                <label class="settings-label">Brush Spacing</label>
                <input type="range" id="settings-brush-spacing" min="0.01" max="0.5" step="0.01" value="0.05" class="brutal-range" style="width: 100%;">
             </div>
             <div class="storage-stat">Storage used: <span id="storage-stat">...</span></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
