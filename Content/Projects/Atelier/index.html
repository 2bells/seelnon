<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier - Digital Art Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Toolbar -->
        <div id="toolbar">
            <div id="tool-actions" class="tool-group">
                <button id="save-btn" class="action-btn" title="Save Image">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
                <button id="manual-save-btn" class="action-btn" title="Force Save" style="margin-left: 4px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                </button>
                 <button id="undo-btn" class="action-btn" title="Undo (Ctrl+Z)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <path d="M3.5 15a9 9 0 1 0 2.12-9.36L1 10"></path>
                    </svg>
                </button>
                <button id="redo-btn" class="action-btn" title="Redo (Ctrl+Y)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                </button>
            </div>

            <div class="tool-group">
                <button class="tool-btn" data-tool="select" title="Select (M)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h6v6H3zM15 3h6v6h-6zM3 15h6v6H3zM15 15h6v6h-6z"/></svg>
                </button>
                <button class="tool-btn" data-tool="pan" title="Pan (H)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
                <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I or hold Alt)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4l-4 4L20 16L16 20L8 12L4 16L3 15L15 3L16 4Z"/></svg>
                </button>
                <button id="mirror-view-btn" class="action-btn" title="Mirror View (B)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="15" y1="12" x2="21" y2="12"></line><line x1="9" y1="12" x2="3" y2="12"></line><line x1="12" y1="9" x2="12" y2="3"></line><line x1="12" y1="15" x2="12" y2="21"></line></svg>
                </button>
            </div>

            <div class="tool-group">
                <div class="size-control">
                    <label for="brush-size">Size</label>
                    <input type="range" id="brush-size" min="1" max="100" value="10">
                    <span id="size-display">10</span>
                </div>
                <div class="opacity-control">
                    <label for="opacity">Opacity</label>
                    <input type="range" id="opacity" min="0" max="100" value="100">
                    <span id="opacity-display">100%</span>
                </div>
            </div>
            
            <div id="brush-selector" class="tool-group">
                <!-- Custom brushes will be loaded here -->
            </div>

            <div class="tool-group">
                <a href="editor.html" id="brush-editor-btn" class="action-btn">Manage Brushes</a>
                <button id="image-manager-btn" class="action-btn" title="Image Manager">Images</button>
            </div>
            
            <div class="tool-group">
                <button id="clear-btn" class="action-btn">Clear Canvas & Data</button>
                <button id="fullscreen-btn" class="action-btn">Fullscreen</button>
            </div>
        </div>
        
        <!-- Canvas Container -->
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
            <div id="zoom-controls">
                <button id="zoom-out">−</button>
                <span id="zoom-level">100%</span>
                <button id="zoom-in">+</button>
                <button id="zoom-fit">Fit</button>
            </div>
        </div>
        
        <!-- Loading indicator -->
        <div id="loading" class="hidden">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Save/Export Modal -->
    <div id="save-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Export Image</h2>
                <button id="cancel-export-btn" class="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <h3>Export Source</h3>
                    <div class="radio-group">
                        <label><input type="radio" name="export-source" value="full" checked> Full Canvas</label>
                        <label><input type="radio" name="export-source" value="selection" disabled> Selection</label>
                    </div>
                </div>

                <div class="setting-group">
                    <h3>Dimensions</h3>
                    <div class="dimension-inputs">
                        <div class="input-wrapper">
                            <label for="export-width">Width</label>
                            <input type="number" id="export-width" min="1">
                            <span>px</span>
                        </div>
                        <div class="input-wrapper">
                             <label for="export-height">Height</label>
                            <input type="number" id="export-height" min="1">
                            <span>px</span>
                        </div>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="keep-aspect-ratio" checked>
                        <label for="keep-aspect-ratio">Keep aspect ratio</label>
                    </div>
                </div>

                <div class="setting-group">
                    <h3>Options</h3>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="include-alpha" checked>
                        <label for="include-alpha">Include transparent background (alpha channel)</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="export-btn" class="action-btn primary">Export</button>
            </div>
        </div>
    </div>

    <!-- Detached Color Picker Panel -->
    <div id="color-panel" class="draggable-panel">
        <div class="panel-header drag-handle">Color</div>
        <div class="panel-content">
            <!-- Color picker will be inserted here by JS -->
        </div>
    </div>

    <!-- Detached Image Manager Panel -->
    <div id="image-manager-panel" class="draggable-panel hidden">
        <div class="panel-header drag-handle">Image Manager <button class="panel-close-btn">&times;</button></div>
        <div class="panel-content">
            <!-- Image manager content will be inserted here by JS -->
        </div>
    </div>

    <!-- Image Viewer Panels will be dynamically created here by JS -->
    
    <script type="importmap">
    {
        "imports": {
            "pixi": "https://cdn.jsdelivr.net/npm/pixi.js@8.0.0/dist/pixi.min.mjs"
        }
    }
    </script>
    <script src="canvas-engine.js"></script>
    <script src="history.js"></script>
    <script src="color-picker.js"></script>
    <script src="brushes.js"></script>
    <script src="images/image-manager.js"></script>
    <script src="images/image-viewer.js"></script>
    <script src="app.js"></script>
</body>
</html>
