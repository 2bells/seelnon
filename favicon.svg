<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Win95 Teal Background -->
  <rect width="32" height="32" fill="#008080" />
  
  <!-- Icon Border (Win95 style bevel) -->
  <path d="M0 31V0H31" stroke="#ffffff" stroke-width="1" fill="none" />
  <path d="M31 0V31H0" stroke="#808080" stroke-width="1" fill="none" />
  
  <!-- Mascot (Bigger Guy) -->
  <path d="M6 25 C 6 15, 9 10, 16 10 C 23 10, 26 15, 26 25 L 26 29 L 6 29 Z" fill="#ffffff" />
  
  <!-- The Wig (Now drawn AFTER body to overlap forehead) -->
  <g fill="#000000">
    <!-- Main Afro Volume -->
    <circle cx="9" cy="12" r="4" />
    <circle cx="11" cy="8" r="4.5" />
    <circle cx="16" cy="6" r="5" />
    <circle cx="21" cy="8" r="4.5" />
    <circle cx="23" cy="12" r="4" />
    <circle cx="12" cy="10" r="4" />
    <circle cx="20" cy="10" r="4" />
    
    <!-- Forehead Curls (Covering the head) -->
    <circle cx="8" cy="15" r="3.5" />
    <circle cx="24" cy="15" r="3.5" />
    <circle cx="13" cy="13" r="3" />
    <circle cx="19" cy="13" r="3" />
    <circle cx="16" cy="11" r="3.5" />
  </g>
  
  <!-- Eyes -->
  <circle cx="11.5" cy="21" r="1.5" fill="#000000" />
  <circle cx="20.5" cy="21" r="1.5" fill="#000000" />
  
  <!-- Yellow Beak -->
  <rect x="13.5" y="23" width="5" height="3" rx="1.5" fill="#FFB000" />

</svg>
